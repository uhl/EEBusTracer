{{define "discovery.html"}}
{{template "layout" .}}
{{end}}

{{define "content"}}
<div class="discovery-page">
    <div class="discovery-header">
        <h2>mDNS Device Discovery</h2>
        <p>Discover EEBus devices on your local network via <code>_ship._tcp</code> mDNS announcements.</p>
        <div class="discovery-actions">
            <button id="btn-mdns-start" class="btn btn-start">Start Discovery</button>
            <button id="btn-mdns-stop" class="btn btn-stop" disabled>Stop Discovery</button>
            <span id="mdns-status" class="capture-status">Stopped</span>
        </div>
    </div>

    <div id="discovery-devices" class="discovery-grid">
        <div class="empty-state">Click "Start Discovery" to scan for EEBus devices</div>
    </div>
</div>

<script src="/static/js/discovery.js"></script>
{{end}}
