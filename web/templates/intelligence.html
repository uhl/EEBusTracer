{{define "content"}}
<div class="main-area">
    <div class="trace-header">
        <h2>{{.Trace.Name}}</h2>
        <div class="trace-menu">
            <button class="trace-menu-btn" id="trace-menu-btn" title="Actions">&#8942;</button>
            <div class="trace-menu-dropdown" id="trace-menu-dropdown">
                <a href="/api/traces/{{.Trace.ID}}/export" class="trace-menu-item">Export</a>
                <button class="trace-menu-item trace-menu-danger" onclick="deleteTrace({{.Trace.ID}})">Delete</button>
            </div>
        </div>
        <nav class="trace-nav">
            <a href="/traces/{{.Trace.ID}}" title="View message table">Messages</a>
            <a href="/traces/{{.Trace.ID}}/charts" title="Visualize timeseries data">Charts</a>
            <a href="/traces/{{.Trace.ID}}/intelligence" class="active" title="Protocol analysis: use cases, subscriptions, heartbeat accuracy">Insights</a>
        </nav>
    </div>
    <div class="intel-tabs reveal">
        <button class="intel-tab active" data-tab="usecases" title="EEBus use cases supported by each device">Use Cases</button>
        <button class="intel-tab" data-tab="subscriptions" title="Active subscriptions and notification tracking">Subscriptions</button>
        <button class="intel-tab" data-tab="metrics" title="Heartbeat interval jitter metrics">Heartbeat Accuracy</button>
        <button class="intel-tab" data-tab="depgraph" title="Interactive dependency graph: use cases, devices, features, subscriptions">Dependencies</button>
        <button class="intel-tab" data-tab="writetracking" title="Write history for LoadControl and Setpoint">Write Tracking</button>
        <button class="intel-tab" data-tab="lifecycle" title="Use case lifecycle checklist">Lifecycle</button>
    </div>
    <div class="intel-content reveal reveal-d1" id="intel-content">
        <div class="intel-panel active" id="panel-usecases">
            <div class="empty-state" id="usecases-loading">Loading use cases...</div>
        </div>
        <div class="intel-panel" id="panel-subscriptions">
            <div class="empty-state" id="subscriptions-loading">Loading subscriptions...</div>
        </div>
        <div class="intel-panel" id="panel-metrics">
            <div id="metrics-summary" class="empty-state">Loading heartbeat metrics...</div>
        </div>
        <div class="intel-panel" id="panel-depgraph">
            <div id="depgraph-content" class="empty-state">Loading dependencies...</div>
        </div>
        <div class="intel-panel" id="panel-writetracking">
            <div class="empty-state">Loading write tracking...</div>
        </div>
        <div class="intel-panel" id="panel-lifecycle">
            <div class="empty-state">Loading lifecycle checklist...</div>
        </div>
    </div>
</div>
<script>
    window.TRACE_ID = {{.Trace.ID}};
</script>
<script src="/static/js/common.js"></script>
<script src="/static/js/intelligence.js"></script>
{{end}}

{{template "layout" .}}
