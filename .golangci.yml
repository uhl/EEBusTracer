version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - revive
    - misspell
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - ifElseChain
        - hugeParam
  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    max-issues-per-linter: 50
    max-same-issues: 5
